<!doctype html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Spiritual Civilization</title><style>*{box-sizing:border-box}html,body,#app{height:100%;margin:0}body{overflow:hidden;background:#10140d;color:#f7f1dd;font-family:system-ui,-apple-system,Segoe UI,sans-serif}button{font:inherit;color:inherit}.game{height:100dvh;display:grid;grid-template-rows:68px 1fr 118px;gap:10px;padding:10px}.hud,.map,.side,.bar,.modal{border:1px solid #ffffff26;background:#ffffff12;border-radius:20px;box-shadow:0 18px 50px #0008}.hud{display:grid;grid-template-columns:1fr 2fr;gap:10px}.brand{padding:12px 16px}.brand b{font-family:Georgia,serif;font-size:22px}.brand span,.small,p,.act em{color:#c9c0a8;font-size:13px}.stats{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;padding:8px}.stat{border:1px solid #ffffff1f;border-radius:14px;padding:8px;background:#ffffff0a}.stat span,.ey{display:block;color:#f4d77b;text-transform:uppercase;letter-spacing:.12em;font-size:10px;font-weight:800}.stat b{display:block;margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.main{min-height:0;display:grid;grid-template-columns:1fr 340px;gap:10px}.map,.side{min-height:0;padding:12px;overflow:hidden}.map{display:grid;grid-template-rows:auto 1fr;gap:8px}.top{display:flex;justify-content:space-between}.top h1{font-family:Georgia,serif;margin:2px 0 0;font-size:clamp(22px,2.4vw,34px)}.village{position:relative;overflow:hidden;border:1px solid #f4d77b33;border-radius:18px;background:radial-gradient(circle at 50% 50%,#f4d77b2b,transparent 130px),radial-gradient(circle at 25% 70%,#5f8f533d,transparent 160px),linear-gradient(150deg,#26351e,#121a10)}.village.danger{border-color:#f0a08fcc}.path{position:absolute;left:50%;top:50%;width:62%;height:10px;background:#f4d77b22;border-radius:99px;transform-origin:left center}.p1{transform:rotate(0) translateX(-50%)}.p2{transform:rotate(55deg) translateX(-50%)}.p3{transform:rotate(-45deg) translateX(-50%)}.zone,.tok{position:absolute;translate:-50% -50%;border:1px solid #ffffff2a;background:#0007;cursor:pointer;box-shadow:0 10px 22px #0007}.zone{min-width:76px;padding:7px;border-radius:15px;text-align:center}.zone.chosen{border-color:#f4d77b;background:#f4d77b24}.zone span{font-size:22px}.zone small,.tok small{display:block;color:#c9c0a8;font-size:10px}.tok{width:54px;min-height:58px;border-radius:999px 999px 16px 16px;padding:4px;text-align:center;transition:left .45s,top .45s;animation:bob 1.2s infinite}.tok span{display:grid;place-items:center;margin:auto;width:32px;height:32px;border-radius:50%;background:#f4d77b2b;color:#f4d77b}.tok.sel{border-color:#f4d77b;box-shadow:0 0 0 7px #f4d77b18}.side{display:grid;grid-template-rows:auto auto auto 1fr;gap:8px}.card{border:1px solid #ffffff24;border-radius:14px;background:#ffffff0c;padding:10px}.card.urgent{border-color:#f0a08f;background:#f0a08f18}.person{display:flex;gap:10px;align-items:center}.person b{font-size:30px;color:#f4d77b}.prog{height:8px;background:#ffffff18;border-radius:99px;overflow:hidden}.prog span{display:block;height:100%;background:linear-gradient(90deg,#f4d77b,#9ed6b4)}.quick{display:grid;grid-template-columns:1fr 1fr;gap:7px;align-self:end}.quick button,.primary,.end,.x,.help{border:1px solid #ffffff24;border-radius:12px;background:#ffffff18;padding:8px;cursor:pointer}.primary,.end{border-color:#f4d77b;background:#f4d77b24}.bar{display:grid;grid-template-columns:repeat(6,1fr)100px;gap:8px;padding:8px}.act{border:1px solid #ffffff24;border-radius:14px;background:#ffffff10;padding:9px;text-align:left;cursor:pointer;display:grid;gap:3px}.act.good{border-color:#9ed6b4;background:#9ed6b418}.act:disabled{opacity:.45}.act span{color:#c9c0a8;font-size:12px}.act em{border-top:1px solid #ffffff24;padding-top:3px;font-style:normal}.toast{position:fixed;left:50%;bottom:134px;translate:-50%;background:#17130ee6;border:1px solid #f4d77b;border-radius:14px;padding:10px 14px;box-shadow:0 12px 40px #0009}.back{position:fixed;inset:0;display:grid;place-items:center;background:#0009;backdrop-filter:blur(8px)}.modal{width:min(760px,calc(100vw - 40px));max-height:calc(100dvh - 60px);display:grid;grid-template-rows:auto 1fr;overflow:hidden}.modal header{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;border-bottom:1px solid #ffffff24}.body{overflow:auto;padding:12px}.grid{display:grid;gap:8px}.row,.choice{border:1px solid #ffffff24;background:#ffffff10;border-radius:14px;padding:10px;text-align:left;cursor:pointer}.row.active{border-color:#f4d77b;background:#f4d77b20}@keyframes bob{50%{transform:translateY(-4px)}}@media(max-width:1050px){.hud{grid-template-columns:1fr}.brand{display:none}.main{grid-template-columns:1fr 300px}.bar{grid-template-columns:repeat(3,1fr)100px}.act span{display:none}}</style></head><body><div id='app'></div><script>const V='Strategic village v8 — no-scroll command UI',K='sc-v8',C=(v,a=0,b=100)=>Math.max(a,Math.min(b,Math.round(v))),P=a=>a[Math.floor(Math.random()*a.length)],AV=a=>Math.round(a.reduce((s,v)=>s+v,0)/a.length),L=s=>s[0].toUpperCase()+s.slice(1),IDS=()=>Math.random().toString(36).slice(2,9);const peopleSeed=[['Aru','Mediator','◇'],['Liora','Teacher','✦'],['Nima','Gardener','❋'],['Sahar','Artist','✺'],['Talin','Builder','◆'],['Mira','Healer','☾'],['Oren','Scholar','☉'],['Ziva','Steward','✹']];const zones=[['council','Council','🔥',48,48],['school','School','📜',25,28],['garden','Garden','🌿',25,70],['workshop','Workshop','🛠',72,68],['grove','Grove','✦',72,27],['arts','Arts','🎶',86,50],['homes','Homes','☾',15,50]];const acts=[['Consult','council',['Mediator','Scholar','Steward'],{unity:5,justice:4},{food:-1},-8,'Seek truth together.'],['Teach','school',['Teacher','Scholar'],{knowledge:6,unity:1},{food:-1},-7,'Build capacity.'],['Tend','garden',['Gardener','Steward'],{food:8,ecology:5},{beauty:-1},-10,'Care for land and food.'],['Serve','workshop',['Healer','Builder'],{service:7,unity:2},{spirit:-2},-12,'Meet concrete needs.'],['Devote','grove',['Healer','Artist'],{spirit:8,beauty:2},{food:-1},4,'Renew inner life.'],['Build','workshop',['Builder','Steward'],{service:2,knowledge:1},{food:-2},-11,'Upgrade selected project.',1]];const projects=[['council','Council Fire','🔥','Better consultation',{unity:3,justice:3},18],['school','School Circle','📜','Stronger learning',{knowledge:4},20],['garden','Terraced Gardens','🌿','More food and ecology',{food:6,ecology:3},22],['workshop','Workshop','🛠','Better service',{service:4},24],['grove','Sacred Grove','✦','More spirit',{spirit:5},22],['homes','Rest Houses','☾','Better recovery',{unity:2,spirit:2},19]];const dilemmas=[['Scarce Grain','The stores are low. How should the village respond?',[['Ration fairly',{justice:6,food:4,unity:-2},'Fairness calms fear.'],['Feed guests',{unity:5,spirit:4,food:-6},'Hospitality inspires but costs food.'],['Emergency gardens',{food:8,ecology:2,morale:-4},'Labour saves the village but tires people.']]],['Quiet Injustice','One family has been left out of decisions.',[['Public consultation',{justice:8,unity:2,spirit:-2},'Truth heals and stings.'],['Private mediation',{justice:5,unity:4},'Relationships soften.'],['Ignore it',{justice:-9,unity:-5,food:2},'Work continues, trust falls.']]]];function make(s){return{id:IDS(),n:s[0],r:s[1],g:s[2],e:C(62+Math.random()*25),t:C(45+Math.random()*30),m:C(48+Math.random()*25),z:P(zones)[0],mem:'Still learning through tests.'}}function fresh(){let p=peopleSeed.slice(0,6).map(make);return{day:1,att:3,sel:p[0].id,proj:'council',open:null,stage:'First Village',met:{unity:43,justice:40,knowledge:34,beauty:30,service:38,spirit:37,ecology:45,food:44},p,pr:Object.fromEntries(projects.map(x=>[x[0],{l:x[0]=='council'?1:0,p:0}])),d:P(dilemmas),toast:'Welcome. Select a villager, choose 3 actions, resolve dilemmas, end the day.',log:['A small village begins. Balance matters more than spamming.']}}let S=load()||fresh();function load(){try{return JSON.parse(localStorage.getItem(K))}catch{return null}}function save(){localStorage.setItem(K,JSON.stringify(S))}function W(){return S.p.find(x=>x.id==S.sel)||S.p[0]}function PR(){return projects.find(x=>x[0]==S.proj)}function PS(k=S.proj){return S.pr[k]||{l:0,p:0}}function chance(w,a){return C(55+(a[2].includes(w.r)?25:0)+Math.round((w.e-50)/4)+Math.round((w.t-50)/6),18,94)}function apply(e){for(let[k,v]of Object.entries(e||{})){if(k=='morale')S.p.forEach(x=>x.m=C(x.m+v));else S.met[k]=C((S.met[k]||0)+v)}}function note(x){S.toast=x;clearTimeout(note.t);note.t=setTimeout(()=>{S.toast='';render()},2200)}function stage(){let vals=Object.values(S.met),a=AV(vals),m=Math.min(...vals);S.stage=a>76&&m>62?'Spiritual Civilization':a>62&&m>46?'Culture of Service':a>51&&m>35?'Learning Community':'First Village'}function act(i){let a=acts[i],w=W();if(S.att<=0)return note('No attention left. End the day.');if(w.e<15&&a[0]!='Rest')return note(w.n+' is exhausted.');let c=chance(w,a),ok=Math.random()*100<c;S.att--;w.z=a[1];w.e=C(w.e+a[5]);w.t=C(w.t+(ok?3:-3));w.m=C(w.m+(ok?2:-4));if(ok){apply(a[3]);apply(a[4]);S.log.unshift(w.n+' succeeded at '+a[0]+'. '+a[6]);note(a[0]+' succeeded at '+c+'%.');if(a[7])build(w)}else{apply(Object.fromEntries(Object.keys(a[3]).map(k=>[k,-2])));S.log.unshift(w.n+' failed at '+a[0]+'.');note(a[0]+' failed. Match role and energy.')}stage();save();render()}function build(w){let pr=PR(),r=PS();r.p+=(w.r=='Builder'?10:6);if(r.p>=pr[5]+r.l*8){r.l++;r.p=0;apply(pr[4]);note(pr[1]+' upgraded.')}}function choice(i){let o=S.d[2][i];apply(o[1]);S.log.unshift(S.d[0]+': '+o[0]+'. '+o[2]);S.d=null;S.open=null;stage();save();render()}function endDay(){let cost=Math.ceil(S.p.length*1.5);S.met.food=C(S.met.food-cost);S.att=3;S.day++;S.p.forEach(x=>{x.e=C(x.e+22+PS('homes').l*5);x.m=C(x.m+(S.met.food<22?-5:2));x.z=P(['homes','council','garden','grove'])});if(!S.d&&Math.random()<.7)S.d=P(dilemmas);S.log.unshift('Day '+S.day+' begins. Food used: '+cost+'.');stage();save();render()}function render(){let w=W(),pr=PR(),wk=Object.entries(S.met).sort((a,b)=>a[1]-b[1])[0];app.innerHTML=`<div class=game><header class=hud><div class=brand><b>Spiritual Civilization</b><span>${V}</span></div><div class=stats><div class=stat><span>Day</span><b>${S.day}</b></div><div class=stat><span>Stage</span><b>${S.stage}</b></div><div class=stat><span>Attention</span><b>${S.att}/3</b></div><div class=stat><span>Food</span><b>${S.met.food}</b></div><div class=stat><span>Weakest</span><b>${L(wk[0])}</b></div></div></header><main class=main><section class=map><div class=top><div><span class=ey>Village Map</span><h1>${S.d?S.d[0]:'Guide the village deliberately.'}</h1></div><button class=help data-open=help>?</button></div>${map()}</section><aside class=side><div class='card ${S.d?'urgent':''}'><span class=ey>Current Situation</span><h2>${S.d?S.d[0]:'No dilemma active'}</h2><p>${S.d?S.d[1]:'Improve '+L(wk[0])+' and build '+pr[1]+'.'}</p>${S.d?'<button class=primary data-open=dilemma>Resolve</button>':''}</div><div class=card><span class=ey>Selected Villager</span><div class=person><b>${w.g}</b><div><h2>${w.n}</h2><p>${w.r} · Energy ${w.e} · Trust ${w.t}</p></div></div></div><div class=card><span class=ey>Selected Project</span><h2>${pr[2]} ${pr[1]} Lv.${PS().l}</h2><div class=prog><span style='width:${Math.min(100,PS().p/(pr[5]+PS().l*8)*100)}%'></span></div><p>${pr[3]}</p></div><div class=quick><button data-open=villagers>Villagers</button><button data-open=projects>Projects</button><button data-open=history>History</button><button data-reset=1>Reset</button></div></aside></main><footer class=bar>${acts.map((a,i)=>AB(a,i,w)).join('')}<button class=end data-end=1>End Day</button></footer></div>${modal()}${S.toast?`<div class=toast>${S.toast}</div>`:''}`;bind()}function map(){return`<div class='village ${S.d?'danger':''}'><div class='path p1'></div><div class='path p2'></div><div class='path p3'></div>${zones.map(z=>`<button class='zone ${S.proj==z[0]?'chosen':''}' data-project=${z[0]} style='left:${z[3]}%;top:${z[4]}%'><span>${z[2]}</span><small>${z[1]}</small></button>`).join('')}${S.p.map((p,i)=>{let z=zones.find(q=>q[0]==p.z)||['','',0,50,82],x=C(z[3]+Math.cos(i*1.7+S.day)*(4+i%3),5,95),y=C(z[4]+Math.sin(i*1.2+S.day)*(4+i%4),8,92);return`<button class='tok ${p.id==S.sel?'sel':''} ${p.e<25?'tired':''}' data-sel=${p.id} style='left:${x}%;top:${y}%'><span>${p.g}</span><small>${p.n}</small></button>`}).join('')}</div>`}function AB(a,i,w){let c=chance(w,a),m=a[2].includes(w.r);return`<button class='act ${m?'good':''}' data-act=${i} ${S.att<=0?'disabled':''}><strong>${a[0]}</strong><span>${a[6]}</span><em>${c}% · ${m?'role match':'weak match'}</em></button>`}function modal(){if(!S.open)return'';return`<div class=back><section class=modal><header><h2>${L(S.open)}</h2><button class=x data-close=1>×</button></header><div class=body>${body()}</div></section></div>`}function body(){if(S.open=='villagers')return`<div class=grid>${S.p.map(p=>`<button class='row ${p.id==S.sel?'active':''}' data-pick=${p.id}><b>${p.g}</b> ${p.n} — <span>${p.r} · Energy ${p.e} · Trust ${p.t}</span></button>`).join('')}</div>`;if(S.open=='projects')return`<div class=grid>${projects.map(p=>`<button class='row ${p[0]==S.proj?'active':''}' data-project=${p[0]}><b>${p[2]}</b> ${p[1]} — <span>${p[3]}</span></button>`).join('')}</div>`;if(S.open=='history')return`<ol class=history>${S.log.slice(0,12).map(x=>`<li>${x}</li>`).join('')}</ol>`;if(S.open=='dilemma'&&S.d)return`<p class=small>${S.d[1]}</p><div class=grid>${S.d[2].map((o,i)=>`<button class=choice data-choice=${i}><b>${o[0]}</b><span>${o[2]}</span></button>`).join('')}</div>`;return`<div class=grid><p><b>Goal:</b> build a balanced village without scrolling or spam-clicking.</p><p>Select a villager, use 3 actions, resolve dilemmas, upgrade projects, then end the day.</p></div>`}function bind(){document.querySelectorAll('[data-act]').forEach(b=>b.onclick=()=>act(+b.dataset.act));document.querySelectorAll('[data-open]').forEach(b=>b.onclick=()=>{S.open=b.dataset.open;render()});document.querySelectorAll('[data-close],.back').forEach(b=>b.onclick=e=>{if(e.target==b){S.open=null;render()}});document.querySelectorAll('[data-choice]').forEach(b=>b.onclick=()=>choice(+b.dataset.choice));document.querySelectorAll('[data-project]').forEach(b=>b.onclick=()=>{S.proj=b.dataset.project;S.open=null;save();render()});document.querySelectorAll('[data-sel],[data-pick]').forEach(b=>b.onclick=()=>{S.sel=b.dataset.sel||b.dataset.pick;S.open=null;save();render()});let r=document.querySelector('[data-reset]');if(r)r.onclick=()=>{localStorage.removeItem(K);S=fresh();save();render()};let e=document.querySelector('[data-end]');if(e)e.onclick=endDay}document.addEventListener('keydown',e=>{if(e.key=='Escape'){S.open=null;render()}});save();render();</script></body></html>
