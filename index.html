<script>
const VERSION='Strategic village v9 — living systems + 2D assets';
const KEY='spiritual-civilization-v9';
const clamp=(n,min=0,max=100)=>Math.max(min,Math.min(max,Math.round(n)));
const pick=a=>a[Math.floor(Math.random()*a.length)];
const avg=a=>Math.round(a.reduce((s,n)=>s+n,0)/Math.max(1,a.length));
const id=()=>Math.random().toString(36).slice(2,9);
const title=s=>String(s).replace(/([A-Z])/g,' $1').replace(/^./,c=>c.toUpperCase());
const peopleSeeds=[['Aru','Mediator','patient','resentment','#d9a066'],['Liora','Teacher','truthful','pride','#deb887'],['Nima','Gardener','generous','fear','#9fbf75'],['Sahar','Artist','loving','envy','#c78ad8'],['Talin','Builder','courageous','impatience','#94a8d8'],['Mira','Healer','humble','despair','#8fd0bf'],['Oren','Scholar','detached','apathy','#d6c77e'],['Ziva','Steward','just','greed','#cfa18f']];
const zones={council:{name:'Council Fire',kind:'council',x:49,y:50,unlock:'Group consultation and mediation'},school:{name:'School Circle',kind:'school',x:25,y:27,unlock:'Mentorship and skill growth'},garden:{name:'Gardens',kind:'garden',x:25,y:72,unlock:'Food, ecology, and stewardship'},workshop:{name:'Workshop',kind:'workshop',x:72,y:68,unlock:'Tools, repairs, and building'},grove:{name:'Sacred Grove',kind:'grove',x:73,y:27,unlock:'Reflection, forgiveness, and spiritual renewal'},arts:{name:'Arts Hall',kind:'arts',x:86,y:50,unlock:'Culture, beauty, and shared memory'},homes:{name:'Homes',kind:'homes',x:14,y:50,unlock:'Recovery, families, and belonging'}};
const actions={garden:{label:'Tend Garden',zone:'garden',roles:['Gardener','Steward'],desc:'Grow food and care for the land.',energy:-14,effects:{food:8,ecology:3},cost:{beauty:-1},rel:1},consult:{label:'Consult',zone:'council',roles:['Mediator','Scholar','Steward'],desc:'Seek truth with the community.',energy:-9,effects:{unity:4,justice:3,knowledge:1},cost:{food:-1},rel:2},mentor:{label:'Mentor',zone:'school',roles:['Teacher','Scholar'],desc:'Invest in another villager.',energy:-10,effects:{knowledge:5,unity:1},cost:{food:-1},target:true,rel:5,requires:{school:1}},mediate:{label:'Mediate',zone:'council',roles:['Mediator','Healer','Steward'],desc:'Repair a strained relationship.',energy:-12,effects:{justice:5,unity:3},cost:{spirit:-1},target:true,rel:8,requires:{council:1}},serve:{label:'Serve',zone:'workshop',roles:['Healer','Builder','Steward'],desc:'Meet a concrete need.',energy:-15,effects:{service:7,unity:2,tools:1},cost:{spirit:-2},rel:3},reflect:{label:'Reflect',zone:'grove',roles:['Healer','Artist'],desc:'Heal morale, trust, and purpose.',energy:8,effects:{spirit:6,beauty:2},cost:{food:-1},trust:4,rel:1},festival:{label:'Festival',zone:'arts',roles:['Artist','Teacher'],desc:'Transform memories into culture.',energy:-9,effects:{beauty:7,unity:3,spirit:2},cost:{food:-2},rel:2,requires:{arts:1}},build:{label:'Build',zone:'workshop',roles:['Builder','Steward'],desc:'Upgrade the selected institution.',energy:-13,effects:{tools:1,knowledge:1},cost:{food:-2},build:true,rel:0}};
const projects={council:{name:'Council Fire',icon:'council',need:18,effects:{unity:3,justice:3},text:'Unlocks mediation and better collective decisions.'},school:{name:'School Circle',icon:'school',need:18,effects:{knowledge:4},text:'Unlocks mentorship and role growth.'},garden:{name:'Terraced Gardens',icon:'garden',need:20,effects:{food:7,ecology:3},text:'Improves food security and ecology.'},workshop:{name:'Workshop',icon:'workshop',need:22,effects:{tools:4,service:2},text:'Improves service, repairs, and building.'},grove:{name:'Sacred Grove',icon:'grove',need:20,effects:{spirit:5,beauty:2},text:'Improves trust recovery and reflection.'},arts:{name:'Arts Hall',icon:'arts',need:19,effects:{beauty:5,unity:2},text:'Unlocks festivals and shared memory.'},homes:{name:'Rest Houses',icon:'homes',need:18,effects:{unity:2,spirit:2},text:'Improves daily recovery and belonging.'}};
const dilemmaTemplates=[{kind:'unheard',title:'A Voice Left Out',text:p=>`${p.a.n} was not invited into a decision that affected their work.`,need:'Restore trust before quiet resentment spreads.',accepts:['consult','mediate','reflect'],resolve:{justice:7,unity:4},fail:{justice:-8,unity:-5}},{kind:'conflict',title:'Strained Relationship',text:p=>`${p.a.n} and ${p.b.n} blame each other for a failed task.`,need:'Repair the relationship or future work will suffer.',accepts:['mediate','consult','serve'],resolve:{unity:7,justice:4},fail:{unity:-8,service:-4}},{kind:'exhausted',title:'Hidden Weariness',text:p=>`${p.a.n} keeps helping, but their energy is nearly gone.`,need:'Let the person recover before service turns bitter.',accepts:['reflect'],resolve:{spirit:6,unity:2},fail:{spirit:-7,service:-5}},{kind:'doubt',title:'Loss of Purpose',text:p=>`${p.a.n} wonders whether the village is only chasing projects.`,need:'Renew meaning, not just productivity.',accepts:['reflect','festival','mentor'],resolve:{spirit:8,beauty:4},fail:{spirit:-9,beauty:-3}},{kind:'scarcity',title:'Food Anxiety',text:p=>`The food stores are low. Fear begins to shrink generosity.`,need:'Secure food without losing justice.',accepts:['garden','consult','serve'],resolve:{food:9,unity:2},fail:{food:-8,unity:-4,justice:-4}}];
function makePerson(seed){return{id:id(),n:seed[0],role:seed[1],virtue:seed[2],shadow:seed[3],color:seed[4],energy:clamp(58+Math.random()*26),trust:clamp(45+Math.random()*28),morale:clamp(48+Math.random()*26),skill:clamp(38+Math.random()*30),zone:pick(Object.keys(zones)),memory:`${seed[0]} is strong in ${seed[2]}, but still learning to transform ${seed[3]}.`,refuses:null};}
function fresh(){const people=peopleSeeds.slice(0,6).map(makePerson);const rel={};people.forEach(a=>people.forEach(b=>{if(a.id!==b.id)rel[a.id+'|'+b.id]=clamp(35+Math.random()*35);}));return{day:1,attention:3,selected:people[0].id,target:people[1].id,project:'council',open:null,metrics:{unity:42,justice:39,knowledge:33,spirit:36,ecology:45,food:46,beauty:30,service:36,tools:20},people,rel,projects:Object.fromEntries(Object.keys(projects).map(k=>[k,{level:k==='council'?1:0,progress:0}])),issue:null,stage:'First Village',toast:'Welcome. The village now runs on people, relationships, needs, and consequences.',log:['A few families gather around the first council fire.']};}
let S=load()||fresh();if(!S.issue)S.issue=makeIssue();stage();function load(){try{return JSON.parse(localStorage.getItem(KEY));}catch{return null;}}function save(){localStorage.setItem(KEY,JSON.stringify(S));}function person(pid=S.selected){return S.people.find(p=>p.id===pid)||S.people[0];}function target(){return S.people.find(p=>p.id===S.target&&p.id!==S.selected)||S.people.find(p=>p.id!==S.selected)||S.people[0];}function relation(a=S.selected,b=S.target){return S.rel[a+'|'+b]??S.rel[b+'|'+a]??50;}function setRelation(a,b,delta){if(!a||!b||a===b)return;const k=S.rel[a+'|'+b]!==undefined?a+'|'+b:b+'|'+a;S.rel[k]=clamp((S.rel[k]??50)+delta);}function pstate(k=S.project){return S.projects[k]||{level:0,progress:0};}function apply(obj){for(const [k,v]of Object.entries(obj||{})){if(k==='trust')S.people.forEach(p=>p.trust=clamp(p.trust+v));else if(k==='morale')S.people.forEach(p=>p.morale=clamp(p.morale+v));else S.metrics[k]=clamp((S.metrics[k]??0)+v);}}function stage(){const vals=Object.values(S.metrics),a=avg(vals),m=Math.min(...vals);S.stage=a>=77&&m>=62?'Spiritual Civilization':a>=63&&m>=48?'Culture of Service':a>=52&&m>=36?'Learning Community':'First Village';}function chance(p,a){let c=42+(a.roles.includes(p.role)?25:0)+Math.round((p.energy-50)/3)+Math.round((p.trust-45)/4)+Math.round((p.skill-40)/5)+(pstate(a.zone).level*5);if(a.target)c+=Math.round((relation()-45)/4);if(S.issue&&S.issue.accepts.includes(a.id))c+=10;return clamp(c,12,95);}function note(msg){S.toast=msg;clearTimeout(note.t);note.t=setTimeout(()=>{S.toast='';render();},2300);}function makeIssue(){const tpl=pick(dilemmaTemplates);const a=pick(S.people);let b=pick(S.people.filter(p=>p.id!==a.id));if(tpl.kind==='scarcity')b=null;return{id:id(),kind:tpl.kind,title:tpl.title,a:a.id,b:b?.id,turns:3,text:tpl.text({a,b}),need:tpl.need,accepts:tpl.accepts,resolve:tpl.resolve,fail:tpl.fail};}
function action(id){const a=actions[id],p=person();if(!a)return;if(S.attention<=0)return note('No attention left. End the day.');const req=a.requires&&Object.entries(a.requires).find(([k,l])=>pstate(k).level<l);if(req)return note(`${projects[req[0]].name} must reach level ${req[1]} first.`);if(a.target&&!target())return note('Choose a target villager first.');if(p.energy<12&&!['reflect'].includes(id))return note(`${p.n} is exhausted and needs reflection or rest.`);if(p.trust<22&&!['reflect','mentor'].includes(id)&&Math.random()<.45){S.attention--;p.memory=`${p.n} refused ${a.label.toLowerCase()} because trust is too low.`;p.zone='homes';S.log.unshift(p.memory);save();render();return note(p.memory);}const c=chance(p,{...a,id}),ok=Math.random()*100<c;S.attention--;p.zone=a.zone;p.energy=clamp(p.energy+a.energy);p.trust=clamp(p.trust+(a.trust||0)+(ok?1:-3));p.morale=clamp(p.morale+(ok?2:-4));let msg;if(ok){apply(a.effects);apply(a.cost);setRelation(p.id,S.target,a.rel||0);p.skill=clamp(p.skill+(a.roles.includes(p.role)?2:1));p.memory=`${p.n} practiced ${a.label.toLowerCase()} and learned through action.`;msg=`${p.n} succeeded at ${a.label} (${c}%).`;if(a.build)build(p);if(S.issue&&S.issue.accepts.includes(id))resolveIssue(id);}else{apply(Object.fromEntries(Object.keys(a.effects).map(k=>[k,-2])));setRelation(p.id,S.target,-3);p.memory=`${p.n} struggled with ${a.label.toLowerCase()}; the village must learn from the failure.`;msg=`${p.n} failed at ${a.label} (${c}%).`;}S.log.unshift(msg);stage();save();render();note(msg);}function build(p){const key=S.project,pr=projects[key],st=pstate(key);st.progress+=(p.role==='Builder'?10:6)+Math.floor(p.skill/25);const need=pr.need+st.level*8;if(st.progress>=need){st.level++;st.progress=0;apply(pr.effects);S.log.unshift(`${pr.name} reached level ${st.level}. ${pr.text}`);note(`${pr.name} upgraded to level ${st.level}.`);}}function resolveIssue(aid){const p=person(),t=S.issue;apply(t.resolve);if(t.a)pBy(t.a).trust=clamp(pBy(t.a).trust+8);if(t.b)setRelation(t.a,t.b,12);p.memory=`${p.n} helped resolve ${t.title.toLowerCase()}.`;S.log.unshift(`${t.title} was resolved through ${actions[aid].label}.`);S.issue=null;}function pBy(id){return S.people.find(p=>p.id===id)||person();}function endDay(){const cost=Math.ceil(S.people.length*1.45);S.metrics.food=clamp(S.metrics.food-cost);S.attention=3;S.day++;const home=pstate('homes').level,grove=pstate('grove').level;S.people.forEach(p=>{p.energy=clamp(p.energy+18+home*5);p.morale=clamp(p.morale+(S.metrics.food<20?-7:2)+grove);p.trust=clamp(p.trust+(S.metrics.justice<30?-4:1));if(p.energy<18)p.zone='homes';});if(S.issue){S.issue.turns--;if(S.issue.turns<=0){apply(S.issue.fail);if(S.issue.a)pBy(S.issue.a).trust=clamp(pBy(S.issue.a).trust-10);if(S.issue.b)setRelation(S.issue.a,S.issue.b,-12);S.log.unshift(`${S.issue.title} was ignored. Consequences spread through the village.`);S.issue=null;}}if(!S.issue&&(Math.random()<.78||S.metrics.food<25||avg(S.people.map(p=>p.trust))<35))S.issue=makeIssue();S.log.unshift(`Day ${S.day} begins. The village used ${cost} food.`);stage();save();render();}
function reset(){localStorage.removeItem(KEY);S=fresh();S.issue=makeIssue();stage();save();render();}
function asset(kind,color='#f4d77b'){const common=`viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg"`,fill=color,stroke='#f7f0dc';if(kind==='person')return`<svg ${common}><circle cx="32" cy="17" r="10" fill="${fill}"/><path d="M18 58c1-17 6-27 14-27s13 10 14 27H18Z" fill="${fill}" opacity=".75"/><path d="M24 37c4 5 12 5 16 0" stroke="${stroke}" stroke-width="3" stroke-linecap="round"/><circle cx="28" cy="15" r="1.8" fill="#20150c"/><circle cx="36" cy="15" r="1.8" fill="#20150c"/></svg>`;if(kind==='council')return`<svg ${common}><circle cx="32" cy="34" r="20" fill="#7a4b29" opacity=".55"/><path d="M22 50h20M18 43l28 11M46 43L18 54" stroke="#b97a45" stroke-width="5" stroke-linecap="round"/><path d="M30 10c9 9 5 15 0 22-7-8-5-15 0-22Z" fill="#f08b3e"/><path d="M36 22c8 8 2 13-4 17-1-7 0-12 4-17Z" fill="#f4d77b"/></svg>`;if(kind==='school')return`<svg ${common}><path d="M14 24 32 12l18 12v28H14V24Z" fill="#9ec7d6" opacity=".75"/><path d="M22 36c6-4 13-4 20 0v14c-7-4-14-4-20 0V36Z" fill="#f7f0dc"/><path d="M32 36v14" stroke="#223" stroke-width="2"/></svg>`;if(kind==='garden')return`<svg ${common}><path d="M12 48c12-10 28-10 40 0" stroke="#8a5" stroke-width="8" stroke-linecap="round"/><path d="M32 48V22" stroke="#9ed6b4" stroke-width="5"/><path d="M32 32c-12 0-13-12-13-12 12 0 13 12 13 12Zm0 0c12 0 13-12 13-12-12 0-13 12-13 12Z" fill="#9ed6b4"/></svg>`;if(kind==='workshop')return`<svg ${common}><path d="M14 48h36v8H14z" fill="#b7a16b"/><path d="M23 42h18l-4 6H27l-4-6Z" fill="#9ec7d6"/><path d="M41 16l8 8-22 22-8-8 22-22Z" fill="#f4d77b"/><path d="M34 18l6-6 12 12-6 6" stroke="#f7f0dc" stroke-width="4" stroke-linecap="round"/></svg>`;if(kind==='grove')return`<svg ${common}><circle cx="32" cy="24" r="18" fill="#9ed6b4" opacity=".65"/><path d="M32 24v30" stroke="#7a4b29" stroke-width="7" stroke-linecap="round"/><path d="M20 54h24" stroke="#f4d77b" stroke-width="4" stroke-linecap="round"/><circle cx="32" cy="24" r="7" fill="#f4d77b" opacity=".75"/></svg>`;if(kind==='arts')return`<svg ${common}><path d="M16 50h32v7H16z" fill="#c78ad8"/><path d="M20 44c8-16 16-16 24 0" stroke="#f4d77b" stroke-width="5" fill="none"/><circle cx="25" cy="27" r="5" fill="#f4d77b"/><circle cx="39" cy="27" r="5" fill="#9ec7d6"/><path d="M26 32v15M40 32v15" stroke="#f7f0dc" stroke-width="3"/></svg>`;if(kind==='homes')return`<svg ${common}><path d="M10 30 32 12l22 18v24H10V30Z" fill="#deb887" opacity=".8"/><path d="M24 54V38h16v16" fill="#5f3924"/><path d="M8 31 32 10l24 21" stroke="#f4d77b" stroke-width="5" stroke-linecap="round"/></svg>`;return'';}
function map(){const selected=person(),t=target(),weak=Object.entries(S.metrics).sort((a,b)=>a[1]-b[1])[0][0];return`<div class="village ${S.metrics.food<25?'lowfood':''} ${avg(S.people.map(p=>p.trust))<35?'unrest':''}"><div class="path p1"></div><div class="path p2"></div><div class="path p3"></div><div class="path p4"></div><svg class="rel-line" viewBox="0 0 100 100" preserveAspectRatio="none"><line x1="${zones[selected.zone]?.x||50}" y1="${zones[selected.zone]?.y||50}" x2="${zones[t.zone]?.x||50}" y2="${zones[t.zone]?.y||50}" stroke="rgba(158,199,214,.55)" stroke-width=".7" stroke-dasharray="2 2"/></svg>${Object.entries(zones).map(([k,z])=>`<button class="zone ${S.project===k?'sel':''} ${weak===zoneMetric(k)?'warn':''}" style="left:${z.x}%;top:${z.y}%" data-project="${k}">${asset(z.kind)}<small>${z.name}</small><div class="level">Lv.${pstate(k).level}</div></button>`).join('')}${S.issue?`<div class="bubble"><b>!</b><span>${S.issue.title}<br><small>${S.issue.turns} days left</small></span></div>`:''}${S.people.map((p,i)=>token(p,i)).join('')}</div>`;}
function zoneMetric(k){return{council:'justice',school:'knowledge',garden:'food',workshop:'service',grove:'spirit',arts:'beauty',homes:'unity'}[k]||'unity';}
function token(p,i){const z=zones[p.zone]||zones.homes,off=(i%4-1.5)*5,yoff=(Math.floor(i/4)-.5)*6;return`<button class="person-token ${p.id===S.selected?'sel':''} ${p.id===S.target?'target':''} ${p.energy<20||p.trust<25?'low':''}" style="left:${clamp(z.x+off,6,94)}%;top:${clamp(z.y+yoff,8,92)}%;animation-delay:${-(i%5)*.18}s" data-person="${p.id}">${asset('person',p.color)}<small>${p.n}</small></button>`;}
function actionButton([id,a]){const p=person(),req=a.requires&&Object.entries(a.requires).find(([k,l])=>pstate(k).level<l),c=req?0:chance(p,{...a,id}),helpful=S.issue?.accepts.includes(id);return`<button class="act ${helpful?'good':''} ${c<35&&!req?'bad':''}" data-action="${id}" ${S.attention<=0||req?'disabled':''}><b>${a.label}</b><span>${a.desc}</span><em>${req?`Needs ${projects[req[0]].name} Lv.${req[1]}`:`${c}% · ${a.roles.join('/')}`}</em></button>`;}
function modal(){if(!S.open)return'';let heading='Window',body='';if(S.open==='villagers'){heading='Villagers';body=`<div class="grid">${S.people.map(p=>`<button class="row ${p.id===S.selected?'active':''}" data-person="${p.id}"><div class="person-mini"><span class="avatar">${asset('person',p.color)}</span><div><h3>${p.n} · ${p.role}</h3><p>${p.memory}</p><div class="tags"><span class="tag">Energy ${p.energy}</span><span class="tag">Trust ${p.trust}</span><span class="tag">Morale ${p.morale}</span><span class="tag">Skill ${p.skill}</span><span class="tag">Virtue: ${p.virtue}</span><span class="tag">Shadow: ${p.shadow}</span></div></div></div></button>`).join('')}</div>`;}if(S.open==='relations'){heading='Relationships';body=`<div class="grid">${S.people.filter(p=>p.id!==S.selected).map(p=>`<button class="row ${p.id===S.target?'active':''}" data-target="${p.id}"><h3>${person().n} ↔ ${p.n}</h3><div class="meter"><span style="width:${relation(S.selected,p.id)}%"></span></div><p>${relation(S.selected,p.id)<35?'Strained: future work may fail.':relation(S.selected,p.id)>68?'Strong bond: cooperation is easier.':'Developing bond.'}</p></button>`).join('')}</div>`;}if(S.open==='projects'){heading='Institutions & Projects';body=`<div class="cols">${Object.entries(projects).map(([k,p])=>`<button class="row ${S.project===k?'active':''}" data-project="${k}">${asset(p.icon)}<h3>${p.name} · Lv.${pstate(k).level}</h3><p>${p.text}</p><div class="meter"><span style="width:${Math.min(100,pstate(k).progress/(p.need+pstate(k).level*8)*100)}%"></span></div><div class="tags"><span class="tag">Need ${p.need+pstate(k).level*8}</span><span class="tag">Progress ${pstate(k).progress}</span></div></button>`).join('')}</div>`;}if(S.open==='history'){heading='Village Memory';body=`<div class="grid">${S.log.map(l=>`<div class="row"><p>${l}</p></div>`).join('')}</div>`;}if(S.open==='issue'){heading=S.issue?.title||'No active problem';body=S.issue?`<div class="grid"><div class="row"><h3>${S.issue.text}</h3><p>${S.issue.need}</p><div class="tags"><span class="tag">${S.issue.turns} days left</span><span class="tag">Helpful actions: ${S.issue.accepts.map(x=>actions[x].label).join(', ')}</span></div></div><div class="cols">${S.issue.accepts.map(x=>`<button class="choice" data-action="${x}"><h3>${actions[x].label}</h3><p>${actions[x].desc}</p></button>`).join('')}</div></div>`:'<p class="empty">No active problem.</p>';}if(S.open==='help'){heading='How to Play';body=`<div class="grid"><div class="row"><h3>Core loop</h3><p>Observe the village, choose a villager, choose a target relationship or project, spend 3 attention each day, then end the day. Your choices change people, relationships, institutions, and the map.</p></div><div class="row"><h3>What changed</h3><p>Villagers can refuse work if trust is low. Relationships affect success. Buildings unlock mechanics. Problems are concrete and tied to specific people. Neglect creates narrative consequences.</p></div><div class="asset-note">${Object.entries(zones).map(([k,z])=>`<div class="asset-tile">${asset(z.kind)}<b>${z.name}</b><small>${z.unlock}</small></div>`).join('')}</div><p>Keyboard: <span class="kbd">Esc</span> closes windows.</p></div>`;}return`<div class="back" data-close="1"><section class="modal" role="dialog" aria-modal="true"><header><h2>${heading}</h2><button class="x" data-close="1">×</button></header><div class="modal-body">${body}</div></section></div>`;}
function render(){const p=person(),t=target(),proj=projects[S.project],weak=Object.entries(S.metrics).sort((a,b)=>a[1]-b[1])[0];document.getElementById('app').innerHTML=`<div class="game"><header class="hud"><div class="brand"><b>Spiritual Civilization</b><span>${VERSION}</span></div><div class="stats"><div class="stat"><span class="ey">Day</span><b>${S.day}</b></div><div class="stat"><span class="ey">Stage</span><b>${S.stage}</b></div><div class="stat"><span class="ey">Attention</span><b>${S.attention}/3</b></div><div class="stat"><span class="ey">Food</span><b>${S.metrics.food}</b></div><div class="stat"><span class="ey">Unity</span><b>${S.metrics.unity}</b></div><div class="stat"><span class="ey">Spirit</span><b>${S.metrics.spirit}</b></div><div class="stat"><span class="ey">Weakest</span><b>${title(weak[0])}</b></div></div></header><main class="main"><section class="map"><div class="top"><div><span class="ey">Living Village</span><h1>${S.issue?S.issue.title:'Guide people through work, trust, and tests.'}</h1><p>${S.issue?S.issue.text:'The map changes as people move, relationships strain or heal, and institutions grow.'}</p></div><div class="top-actions"><button class="iconbtn" data-open="relations">Bonds</button><button class="iconbtn" data-open="help">?</button></div></div>${map()}</section><aside class="side"><div class="card issue ${S.issue?'danger':''}"><span class="ey">Concrete Problem</span><h2>${S.issue?S.issue.title:'None active'}</h2><p>${S.issue?S.issue.need:'Use this calm moment to strengthen the weakest part of the village.'}</p>${S.issue?'<button class="primary" data-open="issue">Respond</button>':''}</div><div class="card selected"><span class="ey">Selected Villager</span><div class="person-mini"><span class="avatar">${asset('person',p.color)}</span><div><h2>${p.n}</h2><p>${p.role} · Energy ${p.energy} · Trust ${p.trust} · Morale ${p.morale}</p></div></div></div><div class="card"><span class="ey">Target Relationship</span><div class="pair"><b>${p.n} ↔ ${t.n}</b><span>${relation()}%</span></div><div class="meter"><span style="width:${relation()}%"></span></div><p>${relation()<35?'Strained bond. Mediation or shared service matters.':'This bond affects target-based actions.'}</p></div><div class="card"><span class="ey">Selected Institution</span><h2>${proj.name} Lv.${pstate().level}</h2><p>${proj.text}</p><div class="meter"><span style="width:${Math.min(100,pstate().progress/(proj.need+pstate().level*8)*100)}%"></span></div></div><div class="panel-actions"><button data-open="villagers">Villagers</button><button data-open="projects">Projects</button><button data-open="history">History</button><button data-reset="1">Reset</button></div></aside></main><footer class="bar">${Object.entries(actions).map(actionButton).join('')}<button class="end" data-end="1">End Day</button></footer></div>${modal()}${S.toast?`<div class="toast">${S.toast}</div>`:''}`;bind();}
function bind(){document.querySelectorAll('[data-person]').forEach(b=>b.onclick=e=>{S.selected=b.dataset.person;if(S.target===S.selected)S.target=S.people.find(p=>p.id!==S.selected)?.id;save();render();});document.querySelectorAll('[data-target]').forEach(b=>b.onclick=e=>{S.target=b.dataset.target;S.open=null;save();render();});document.querySelectorAll('[data-project]').forEach(b=>b.onclick=e=>{S.project=b.dataset.project;save();render();});document.querySelectorAll('[data-action]').forEach(b=>b.onclick=e=>{e.stopPropagation();action(b.dataset.action);});document.querySelectorAll('[data-open]').forEach(b=>b.onclick=e=>{S.open=b.dataset.open;render();});document.querySelectorAll('[data-close]').forEach(b=>b.onclick=e=>{if(e.target.dataset.close){S.open=null;render();}});document.querySelector('[data-end]')?.addEventListener('click',endDay);document.querySelector('[data-reset]')?.addEventListener('click',reset);}document.addEventListener('keydown',e=>{if(e.key==='Escape'&&S.open){S.open=null;render();}});save();render();
</script>
</body>
</html>
